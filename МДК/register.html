<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .message {
            margin-top: 15px;
            font-weight: bold;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
        }
    </style>
</head>
<body>

<header class="main-header">
    <div class="logo">HotelBooking</div>
    <nav class="nav-menu">
        <a href="index.html">Главная</a>
        <a href="hotels.html">Отели</a>
        <a href="company.html">О компании</a>
        <a href="profile.html">Профиль</a>
        <a href="login.html" class="btn-outline">Вход</a>
        <a href="register.html" class="btn-primary">Регистрация</a>
    </nav>
</header>

<div class="form-container">
    <h2>Регистрация</h2>

    <form id="registerForm">
        <input type="text" id="name" placeholder="Имя" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Пароль" minlength="6" required>
        <input type="tel" id="phone" placeholder="Номер телефона" pattern="[0-9+ ]{6,}" required>
        <input type="number" id="age" placeholder="Возраст" min="1" max="120" required>

        <button type="submit">Зарегистрироваться</button>
    </form>

    <div id="message" class="message"></div>
</div>

<script>
const form = document.getElementById("registerForm");
const message = document.getElementById("message");

form.addEventListener("submit", function(event) {
    event.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const age = document.getElementById("age").value.trim();

    if (!name!password!age) {
        message.textContent = "Пожалуйста, заполните все поля.";
        message.className = "message error";
        return;
    }

    if (password.length < 6) {
        message.textContent = "Пароль должен быть не меньше 6 символов.";
        message.className = "message error";
        return;
    }

    if (age < 1 || age > 120) {
        message.textContent = "Введите корректный возраст.";
        message.className = "message error";
        return;
    }

    message.textContent = "Регистрация прошла успешно!";
    message.className = "message success";

    form.reset();
});
</script>

</body>
</html>
