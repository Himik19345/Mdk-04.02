<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HotelBooking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">HotelBooking</div>
        <nav class="nav-menu">
            <a href="index.html">Главная</a>
            <a href="hotels.html">Отели</a>
            <a href="company.html">О компании</a>
            <a href="profile.html">Профиль</a>
            <a href="login.html" class="btn-outline">Вход</a>
            <a href="register.html" class="btn-primary">Регистрация</a>
        </nav>
    </header>

<section class="hero">
    <div class="hero-content">
        <h1>Найдите идеальный отель для вашего отдыха</h1>
        <p>Лучшие предложения в 120 странах мира</p>
    </div>
</section>

<section class="hotels-container">

    <div class="hotel-card">
        <img src="images/hotel1.jpg">
        <div class="hotel-card-content">
            <h3>Luxury Palace</h3>
            <p>5★ | Центр города</p>
            <div class="price">от 12 000 ₽ / ночь</div>
            <button>Забронировать</button>
        </div>
    </div>

    <div class="hotel-card">
        <img src="images/hotel2.jpg">
        <div class="hotel-card-content">
            <h3>Sea View Resort</h3>
            <p>4★ | У моря</p>
            <div class="price">от 9 000 ₽ / ночь</div>
            <button>Забронировать</button>
        </div>
    </div>

    <div class="hotel-card">
        <img src="images/hotel3.jpg">
        <div class="hotel-card-content">
            <h3>Mountain Escape</h3>
            <p>4★ | Горы</p>
            <div class="price">от 7 500 ₽ / ночь</div>
            <button>Забронировать</button>
        </div>
    </div>

</section>

</html>
